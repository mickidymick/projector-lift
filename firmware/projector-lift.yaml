# ESPHome firmware — porch projector lift box
# Wiring + state-machine reference: ../index.html (rendered:
# https://mickidymick.github.io/projector-lift/) — §9 wiring sketch · §10
# firmware target · §12 AV chain (Telnet + PJLink) · §13 Alexa integration
#
# PIN MAP (matches §9 as-built GPIO map):
#   GPIO25  RPWM  → BTS7960 #1 + #2 RPWM (retract / close, tied)
#   GPIO26  LPWM  → BTS7960 #1 + #2 LPWM (extend  / open,  tied)
#   GPIO27  → BTS7960 #1 R_EN + L_EN (independent enable · actuator A)
#   GPIO19  → BTS7960 #2 R_EN + L_EN (independent enable · actuator B)
#   GPIO32  ← BTS7960 #1 R_IS (ADC1_4) actuator A retract (close) current
#   GPIO33  ← BTS7960 #1 L_IS (ADC1_5) actuator A extend  (open)  current
#   GPIO34  ← BTS7960 #2 R_IS (ADC1_6) actuator B retract (close) current
#   GPIO35  ← BTS7960 #2 L_IS (ADC1_7) actuator B extend  (open)  current
#   GPIO17  → IRLZ44N gate via 220 Ω (low-side fan PWM, 6.5 V rail)
#   GPIO16  → 1 kΩ → BC547 base → F-1001 coil (screen drop)
#   GPIO18  ← wall button (Square D X-Series SQR14106WH momentary, switch-to-GND, INPUT_PULLUP)
#   GPIO23  ← Prusa endstop A SIG (deployed-end, NO-to-GND, INPUT_PULLUP)
#   GPIO22  ← Prusa endstop B SIG (deployed-end, NO-to-GND, INPUT_PULLUP)
#
# CONTROL MODEL — single momentary button, endstop-driven dispatch (see
# ProjectorLift::on_button_press in components/projector_lift/):
#   both endstops tripped      ⇒ box is home ⇒ press OPENs
#                                  (cancels COOLDOWN timers if in COOLDOWN)
#   otherwise (any endstop off) ⇒ press CLOSEs (return home from whatever state)
#   state=FAULT                ⇒ press is ignored (manual Diag reset required)
# Rationale: endstops are the only authoritative "where is the box?" signal;
# lift_state can drift after a Diag reset, boot glitch, or manual push.
#
# Endstops are pure state-confirmation sensors — they do NOT cut motors.
# New rails travel 12" vs the actuators' 8" stroke, so the PA-04 internal
# limit switches are the mechanical safety at both ends of travel; the
# external endstops are no longer needed for slide-overrun protection.
# Each endstop is mounted directly on its actuator and trips when the
# actuator is at its fully-retracted endpoint. With BOTH tripped we know
# with certainty that the box is fully CLOSED. Otherwise we treat it as
# OPEN / in motion.
#
# End-of-travel signal for BOTH directions is the IS-pin current drop:
# when the PA-04 internal limit opens the motor circuit, the IS-pin voltage
# falls to ~0. OPENING reads L_IS (extend current); CLOSING reads R_IS
# (retract current). The high end of the IS range saturates the ADC at the
# on-module 10 kΩ pulldown but the low end is fully readable, so
# "current dropped to zero" is a clean binary signal. The travel-safety
# timeout is the fallback failsafe in both directions.
#
# Network reach (§12): on lift state change the firmware sends Telnet mode
# commands to the Denon AVR (port 23) and PJLink power commands to the Epson
# projector (port 4352). AVR persists settings across standby, so Apple TV's
# CEC wake reads the current config.

substitutions:
  name: projector-lift
  friendly: "Projector Lift"

  # Static endpoints — edit to match your DHCP reservations.
  avr_ip: "192.168.1.50"        # Denon AVR-X2800H · Telnet :23
  projector_ip: "192.168.1.51"  # Epson PowerLite L730U · PJLink :4352

esphome:
  name: ${name}
  friendly_name: ${friendly}
  includes:
    - includes.h
  on_boot:
    # Pull every output to a known-safe state before WiFi is up. The
    # projector_lift component also does this in its setup(); this is a
    # belt-and-suspenders call for the -100 priority window.
    - priority: -100
      then:
        - lambda: id(lift).force_closed();
    # Once the network is up, reconcile AVR + projector to current state.
    - priority: -200
      then:
        - script.execute: boot_reconcile

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 115200
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name}-setup"
    password: !secret ap_password
captive_portal:

api:
  encryption:
    key: !secret api_key
  # No HA client at dad's site — default 15-min watchdog was rebooting the
  # ESP32 every 15 min, which called force_closed() and retracted the screen
  # mid-movie. Disable it; HA at your site still connects fine when reachable.
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

# Browser UI at http://projector-lift.local/ — live sensor readouts + the
# Diag buttons + manual reset. No auth: web_server v3's SPA silently
# swallows button-press clicks when `auth:` is enabled (state stream
# still works, but the JS click handler bails before dispatch). LAN-only
# is the trust boundary for now.
web_server:
  port: 80
  version: 3
  ota: false
  log: true
  # v3 sorting: lower weights render first. Numbered by 10s so we can
  # insert new entities without renumbering everything.
  sorting_groups:
    - id: safety_group
      name: "!! Safety"
      sorting_weight: 10
    - id: primary_group
      name: "Primary control"
      sorting_weight: 20
    - id: status_group
      name: "Status"
      sorting_weight: 30
    - id: leveling_group
      name: "Leveling / jogs"
      sorting_weight: 40
    - id: calibration_group
      name: "Calibration"
      sorting_weight: 50
    - id: diag_group
      name: "Diagnostics"
      sorting_weight: 60
    - id: tests_group
      name: "Bench tests"
      sorting_weight: 70

# ===========================================================================
# projector_lift external component — owns the OPEN / CLOSE / EMERGENCY-STOP
# state machine that used to live below as scripts + globals. See
# components/projector_lift/ for the C++ implementation. Everything else
# in this YAML (tunables, GPIOs, sensors, cover, AVR/PJLink scripts, jogs,
# buttons) stays where it is — this block just wires refs into the C++.
# ===========================================================================
external_components:
  - source: components

projector_lift:
  id: lift
  bts_a_enable: bts_a_enable
  bts_b_enable: bts_b_enable
  screen_relay: screen_relay
  rpwm: rpwm
  lpwm: lpwm
  fan_pwm: fan_pwm
  a_ris: a_ris
  a_lis: a_lis
  b_ris: b_ris
  b_lis: b_lis
  endstop_a: endstop_a
  endstop_b: endstop_b
  cruise_pct: cruise_pct
  ramp_ms: ramp_ms
  eot_v: eot_v
  stall_v: stall_v
  travel_timeout_s: travel_timeout_s
  fan_running_pct: fan_running_pct
  fan_cooldown_pct: fan_cooldown_pct
  screen_delay_s: screen_delay_s
  cooldown_min: cooldown_min
  # C++ fires these before it starts moving the actuators.
  on_opening:
    - script.execute: projector_power_on
    - script.execute: avr_outdoor
  on_closing:
    - script.execute: projector_power_off
    - script.execute: avr_indoor
  # C++ fires these from reconcile_from_endstops() (see boot_reconcile).
  on_boot_closed:
    - script.execute: avr_indoor
  on_boot_open:
    - script.execute: avr_outdoor
  on_boot_reconciled:
    - script.execute: projector_query_state

# ===========================================================================
# Tunables — HA Number entities so calibration doesn't need a re-flash.
# PLACEHOLDER entries are marked; measure real values on the bench (see README)
# before trusting auto-stop on current sense.
# ===========================================================================
number:
  - platform: template
    name: "Cruise duty"
    id: cruise_pct
    icon: mdi:speedometer
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 70
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 10

  - platform: template
    name: "PWM ramp duration"
    id: ramp_ms
    icon: mdi:transition
    min_value: 100
    max_value: 2000
    step: 50
    initial_value: 500
    restore_value: true
    optimistic: true
    unit_of_measurement: ms
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 20

  - platform: template
    name: "Travel safety timeout"
    id: travel_timeout_s
    icon: mdi:timer-alert-outline
    min_value: 5
    max_value: 60
    step: 1
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: s
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 30

  - platform: template
    name: "End-of-travel threshold"
    id: eot_v
    icon: mdi:motion-sensor
    min_value: 0.00
    max_value: 1.50
    step: 0.01
    initial_value: 0.18
    restore_value: true
    optimistic: true
    unit_of_measurement: V
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 40

  - platform: template
    name: "Stall threshold"
    id: stall_v
    icon: mdi:alert-outline
    min_value: 0.30
    max_value: 3.20
    step: 0.05
    initial_value: 0.50
    restore_value: true
    optimistic: true
    unit_of_measurement: V
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 50

  - platform: template
    name: "Fan running duty"
    id: fan_running_pct
    icon: mdi:fan
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 100
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 60

  - platform: template
    name: "Fan cooldown duty"
    id: fan_cooldown_pct
    icon: mdi:fan-clock
    min_value: 20
    max_value: 100
    step: 5
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 70

  - platform: template
    name: "Screen post-close delay"
    id: screen_delay_s
    icon: mdi:timer-outline
    min_value: 0
    max_value: 10
    step: 0.5
    initial_value: 3
    restore_value: true
    optimistic: true
    unit_of_measurement: s
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 80

  - platform: template
    name: "Cooldown duration"
    id: cooldown_min
    icon: mdi:timer-cog-outline
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: min
    web_server:
      sorting_group_id: calibration_group
      sorting_weight: 90

  - platform: template
    name: "Jog duty"
    id: jog_pct
    icon: mdi:speedometer-slow
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 70
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    mode: slider
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 10

globals:
  # lift_state + wait_until debounce timers moved into the projector_lift C++
  # component. Only the AVR monitor-mode poll result stays here since the
  # AVR client stays in YAML.
  # Last observed AVR VSMONI? response: -1 unknown · 1 MONI1 · 2 MONI2 · 3 AUTO
  - id: avr_monitor_state
    type: int
    initial_value: '-1'

# ===========================================================================
# PWM outputs — LEDC at 20 kHz (above hearing) for motors; fan PWM at 25 kHz
# to keep MOSFET switching losses sane while staying inaudible. monochromatic
# light wrappers give free soft-ramping; gamma_correct: 1.0 keeps the duty
# curve linear (default 2.8 would non-linearly distort it).
# ===========================================================================
output:
  - platform: ledc
    pin: GPIO25
    id: rpwm_raw
    frequency: 20000Hz
  - platform: ledc
    pin: GPIO26
    id: lpwm_raw
    frequency: 20000Hz
  - platform: ledc
    pin: GPIO17
    id: fan_pwm_raw
    frequency: 25000Hz

light:
  - platform: monochromatic
    output: rpwm_raw
    id: rpwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s
  - platform: monochromatic
    output: lpwm_raw
    id: lpwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s
  - platform: monochromatic
    output: fan_pwm_raw
    id: fan_pwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s

# ===========================================================================
# Discrete outputs
#   screen_relay — BC547 base drive · HIGH closes the F-1001 contact
#   bts_a_enable / bts_b_enable — BTS7960 R_EN + L_EN (one per actuator)
#       HIGH = BTS module active · LOW = outputs hi-Z (motor coasts)
#       Held LOW at rest so a glitch on PWM can't move the motors.
# ===========================================================================
switch:
  - platform: gpio
    pin: GPIO16
    id: screen_relay
    name: "Screen relay"
    restore_mode: ALWAYS_OFF
    icon: mdi:projector-screen
    web_server:
      sorting_group_id: primary_group
      sorting_weight: 40

  - platform: gpio
    pin: GPIO27
    id: bts_a_enable
    name: "BTS A enable"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO19
    id: bts_b_enable
    name: "BTS B enable"
    restore_mode: ALWAYS_OFF
    internal: true

  # Alexa-friendly power surface: "Alexa, turn on/off the projector".
  # HA's Alexa bridge maps this to PowerController; the cover entity below
  # stays around for HA's UI semantics (open/close).
  - platform: template
    name: "Projector"
    id: projector_switch
    icon: mdi:projector
    optimistic: false
    # is_projector_active() is true for OPENING or OPEN.
    lambda: |-
      return id(lift).is_projector_active();
    # request_open() / request_close() are no-ops in inapplicable states
    # (OPEN, CLOSED / COOLDOWN) and skip cleanly from FAULT with a warning,
    # so callers don't need per-state guards.
    turn_on_action:
      - lambda: id(lift).request_open();
    turn_off_action:
      - lambda: id(lift).request_close();
    web_server:
      sorting_group_id: primary_group
      sorting_weight: 30

  # ----- Per-actuator leveling jogs ---------------------------------------
  # Click ON to start moving, click OFF to stop. NO software timeout.
  # Mutex: turning any one ON turns the others OFF (shared PWM lines mean
  # opposing directions ON simultaneously = BTS shoot-through).
  # Endstops interrupt the matching extend jog only (endstop A → jog_a_up,
  # endstop B → jog_b_up). Retract jogs are not interrupted (PA-04 internal
  # limit catches end-of-travel mechanically).

  - platform: template
    name: "Level: actuator A up (extend)"
    id: jog_a_up
    icon: mdi:arrow-up-bold
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 40
    turn_on_action:
      # Mutex via publish_state — does NOT trigger the other switches'
      # turn_off_action (which would race and cut our bts/PWM mid-motion).
      - lambda: |-
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - switch.turn_off: bts_b_enable
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable

  - platform: template
    name: "Level: actuator A down (retract)"
    id: jog_a_down
    icon: mdi:arrow-down-bold
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 50
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - switch.turn_off: bts_b_enable
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable

  - platform: template
    name: "Level: actuator B up (extend)"
    id: jog_b_up
    icon: mdi:arrow-up-bold
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 60
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - delay: 50ms
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Level: actuator B down (retract)"
    id: jog_b_down
    icon: mdi:arrow-down-bold
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 70
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - delay: 50ms
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_b_enable

  # ----- Both-actuator jogs (in-sync leveling / travel check) -------------
  # Same pattern as the per-actuator jogs, but enables BOTH BTS modules so
  # A and B drive together at the same duty. No endstop cutoff — user is
  # watching; PA-04 internal 8" limits are mechanical backup at both ends
  # (drawer slides are 12" so they can't be the failure surface).
  - platform: template
    name: "Level: both up (extend)"
    id: jog_both_up
    icon: mdi:arrow-up-bold-box
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 20
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Level: both down (retract)"
    id: jog_both_down
    icon: mdi:arrow-down-bold-box
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: leveling_group
      sorting_weight: 30
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

# ===========================================================================
# Inputs — wall button + two endstops. All three are NO switch-to-GND with
# INPUT_PULLUP enabled; `inverted: true` so "active" reads as "pressed/tripped".
# ===========================================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode: INPUT_PULLUP
      inverted: true
    id: wall_button
    name: "Wall button (physical)"
    icon: mdi:gesture-tap-button
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    web_server:
      sorting_group_id: status_group
      sorting_weight: 20
    # Momentary rocker (Square D X-Series SQR14106WH): each press fires once;
    # release is ignored. Dispatch is endstop-driven (see on_button_press):
    # both endstops tripped ⇒ box is home ⇒ OPEN. Any endstop off ⇒ CLOSE
    # (retract to home). FAULT ignores the button — Diag: reset to recover.
    # Rationale for endstop-driven (vs state-driven) dispatch: the endstops
    # are the only authoritative "where is the box?" signal. After a FAULT +
    # Diag reset, or a manual box push, lift_state can be wrong and the
    # button needs to still drive the box toward a known-safe endpoint.
    on_press:
      - lambda: id(lift).on_button_press();

  # Endstops are pure state-confirmation sensors under the new design — they
  # do NOT cut motors. Motors run to the PA-04 internal limit and stop when
  # the IS-pin current drops. on_press / on_release here is informational
  # only (logging + the state-derivation text sensor reads .state directly).
  - platform: gpio
    pin:
      number: GPIO23
      mode: INPUT_PULLUP
      inverted: true
    id: endstop_a
    name: "Endstop A (actuator A at home)"
    icon: mdi:home-outline
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    web_server:
      sorting_group_id: status_group
      sorting_weight: 30
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop A tripped — actuator 1 at retracted endpoint (state=%d)", id(lift).get_state_int());
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop A released — actuator 1 left retracted endpoint (state=%d)", id(lift).get_state_int());

  - platform: gpio
    pin:
      number: GPIO22
      mode: INPUT_PULLUP
      inverted: true
    id: endstop_b
    name: "Endstop B (actuator B at home)"
    icon: mdi:home-outline
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    web_server:
      sorting_group_id: status_group
      sorting_weight: 40
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop B tripped — actuator 2 at retracted endpoint (state=%d)", id(lift).get_state_int());
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop B released — actuator 2 left retracted endpoint (state=%d)", id(lift).get_state_int());

sensor:
  - platform: adc
    pin: GPIO32
    id: a_ris
    name: "Actuator A retract current"
    icon: mdi:current-dc
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
    web_server:
      sorting_group_id: status_group
      sorting_weight: 50
  - platform: adc
    pin: GPIO33
    id: a_lis
    name: "Actuator A extend current"
    icon: mdi:current-dc
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
    web_server:
      sorting_group_id: status_group
      sorting_weight: 60
  - platform: adc
    pin: GPIO34
    id: b_ris
    name: "Actuator B retract current"
    icon: mdi:current-dc
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
    web_server:
      sorting_group_id: status_group
      sorting_weight: 70
  - platform: adc
    pin: GPIO35
    id: b_lis
    name: "Actuator B extend current"
    icon: mdi:current-dc
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
    web_server:
      sorting_group_id: status_group
      sorting_weight: 80

text_sensor:
  - platform: template
    name: "Lift state"
    id: lift_state_str
    icon: mdi:elevator
    update_interval: 1s
    web_server:
      sorting_group_id: status_group
      sorting_weight: 10
    lambda: |-
      // Derived from physical endstops, NOT the internal state machine —
      // so it reflects current physical reality across reboots / faults.
      // Endstops are mounted on the actuators and trip when those actuators
      // are at their fully-retracted endpoint. BOTH tripped = box certainly
      // CLOSED. Anything else (one tripped, neither tripped) = the box is
      // either OPEN, in motion, or in an asymmetric state — call it OPEN.
      if (id(endstop_a).state && id(endstop_b).state) {
        return {"CLOSED"};
      }
      return {"OPEN"};

  - platform: template
    name: "AVR monitor mode"
    id: avr_monitor_str
    icon: mdi:hdmi-port
    update_interval: 5s
    web_server:
      sorting_group_id: status_group
      sorting_weight: 90
    lambda: |-
      switch (id(avr_monitor_state)) {
        case 1: return {"MONI1"};
        case 2: return {"MONI2"};
        case 3: return {"AUTO"};
        default: return {"unknown"};
      }

# ===========================================================================
# HA cover entity — gives HA + Alexa standard up/down semantics
# ===========================================================================
cover:
  - platform: template
    name: "Projector lift"
    id: lift_cover
    device_class: shutter
    optimistic: true
    assumed_state: true
    icon: mdi:elevator
    web_server:
      sorting_group_id: primary_group
      sorting_weight: 20
    open_action:
      - lambda: id(lift).request_open();
    close_action:
      - lambda: id(lift).request_close();
    # STOP also cancels any in-flight endstop-test script (those live in
    # YAML and the C++ component can't reach them). emergency_stop() then
    # kills all motion + drops the screen + sets state=FAULT.
    stop_action:
      - script.stop: test_endstop_a_cycle
      - script.stop: test_endstop_b_cycle
      - lambda: id(lift).emergency_stop();

# ===========================================================================
# Periodic AVR state polling — exposes monitor mode to HA while OPEN so HA
# can decide when to fire BOTH-mode commands. Detecting "Sony TV just woke"
# reliably from the AVR alone isn't possible on the X2800H without testing;
# the polling skeleton is here so HA automations have something to react to.
# ===========================================================================
interval:
  - interval: 5s
    then:
      - if:
          condition:
            lambda: return id(lift).is_open();
          then:
            - script.execute: avr_query_monitor

# ===========================================================================
# Scripts — state transitions + network clients
# ===========================================================================
script:
  # enter_closed, emergency_stop, wall_press, open_lift, close_lift, and
  # cooldown_timer moved into the projector_lift C++ component. YAML still
  # owns boot_reconcile (needs wifi.connected wait), the AVR/PJLink clients,
  # and the temporary endstop bench-test scripts below.

  # ---- Boot reconciliation ----------------------------------------------
  # Wait for WiFi + endstop settle, then hand off to the C++ component,
  # which derives state from physical endstops (handles power-loss-while-
  # open) and fires on_boot_closed / on_boot_open / on_boot_reconciled up
  # in the projector_lift block — those hooks run avr_indoor / avr_outdoor
  # / projector_query_state as needed.
  - id: boot_reconcile
    then:
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - delay: 1s
      - lambda: id(lift).reconcile_from_endstops();

  # ===========================================================================
  # AVR Telnet client — Denon AVR-X2800H, port 23. Commands are ASCII,
  # CR-terminated. Each script opens a fresh TCP connection so a network blip
  # doesn't leave a stale socket pinned to the AVR. Sockets are POSIX/lwip
  # via the helpers in includes.h — works in both Arduino and ESP-IDF builds.
  #
  # TOPOLOGY (2026-07-05 rearchitecture): everything runs on Main zone. Zone 2
  # is not used. Amp Assign in AVR Setup must be "5.1ch + Front B". Speaker
  # wiring: indoor 5.1 pair on Front A terminals, porch stereo pair on Front B.
  # Mode switching is Main-zone Front A/B via PSFRONT, not Zone 2 power. This
  # makes Apple TV HDMI-CEC volume Just Work — CEC targets Main volume, which
  # drives whichever Front pair is currently active.
  #
  # Sound mode is forced to STEREO when Front B is active so Center / Surround
  # / Sub channels don't bleed to their (indoor) speakers while porch plays.
  # On return to indoor we set MOVIE so surround decode resumes for the TV.
  # ===========================================================================
  - id: avr_indoor
    then:
      - lambda: |-
          int s = tcp_connect_retry("avr.indoor", "${avr_ip}", 23, 500, 1);
          if (s < 0) return;
          static const char *cmds[] = {"VSMONI1\r",     "PSFRONT SPA\r", "MSMOVIE\r", "MUOFF\r"};
          static const char *toks[] = {"VSMONI1",       "PSFRONT SPA",   "MSMOVIE",   "MUOFF"};
          tcp_send_and_verify("avr.indoor", s, cmds, toks, 4);
          ::close(s);

  - id: avr_outdoor
    then:
      - lambda: |-
          int s = tcp_connect_retry("avr.outdoor", "${avr_ip}", 23, 500, 1);
          if (s < 0) return;
          static const char *cmds[] = {"VSMONI2\r",     "PSFRONT SPB\r", "MSSTEREO\r", "MUOFF\r"};
          static const char *toks[] = {"VSMONI2",       "PSFRONT SPB",   "MSSTEREO",   "MUOFF"};
          tcp_send_and_verify("avr.outdoor", s, cmds, toks, 4);
          ::close(s);

  # avr_both = same source everywhere (Front A + Front B driven together). Kept
  # around for manual "listening across the house" cases; not fired by the state
  # machine. Sound mode stays STEREO because Front B is a 2-ch pair.
  - id: avr_both
    then:
      - lambda: |-
          int s = tcp_connect_retry("avr.both", "${avr_ip}", 23, 500, 1);
          if (s < 0) return;
          static const char *cmds[] = {"VSMONIAUTO\r",  "PSFRONT A+B\r", "MSSTEREO\r", "MUOFF\r"};
          static const char *toks[] = {"VSMONIAUTO",    "PSFRONT A+B",   "MSSTEREO",   "MUOFF"};
          tcp_send_and_verify("avr.both", s, cmds, toks, 4);
          ::close(s);

  - id: avr_query_monitor
    then:
      - lambda: |-
          int err = 0;
          int s = tcp_connect("${avr_ip}", 23, 300, &err);
          if (s < 0) {
            // Poll runs every 5s while OPEN — log at DEBUG so we don't flood
            // WARN, but still leave a trail if the AVR goes unreachable.
            ESP_LOGD("avr", "query connect fail (errno=%d %s)", err, strerror(err));
            return;
          }
          // Denon "VS" family uses a space before `?` for queries. If the
          // AVR returns nothing on first test, try "VSMONI?" without the
          // space — some firmware revisions accept either form.
          const char *q = "VSMONI ?\r";
          tcp_send(s, q, strlen(q));
          std::string resp;
          tcp_read_until_cr(s, resp, 300);
          ::close(s);
          int mode = -1;
          if      (resp.find("VSMONIAUTO") != std::string::npos) mode = 3;
          else if (resp.find("VSMONI2")    != std::string::npos) mode = 2;
          else if (resp.find("VSMONI1")    != std::string::npos) mode = 1;
          id(avr_monitor_state) = mode;
          ESP_LOGD("avr", "VSMONI? → %d", mode);

  # ===========================================================================
  # PJLink client — Epson L730U, port 4352. Class 1, ASCII, CR-terminated.
  # Assumes PJLink auth is disabled on the projector (Menu → Network →
  # PJLink → Authentication: OFF). If auth is enabled later, prefix the
  # command with the MD5 of (seed + password) per the PJLink spec.
  # ===========================================================================
  - id: projector_power_on
    then:
      - lambda: |-
          int s = tcp_connect_retry("pjlink.on", "${projector_ip}", 4352, 500, 1);
          if (s < 0) return;
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ESP_LOGW("pjlink", "on: no PJLINK 0 greeting (auth on?): %s", greet.c_str());
            ::close(s);
            return;
          }
          const char *cmd = "%1POWR 1\r";
          tcp_send(s, cmd, strlen(cmd));
          // Read the POWR reply so we notice ERR3 (warming/cooling) etc.
          std::string reply;
          tcp_read_until_cr(s, reply, 500);
          ::close(s);
          if (reply.find("POWR=OK") != std::string::npos) {
            ESP_LOGI("pjlink", "→ POWR 1 OK");
          } else {
            ESP_LOGW("pjlink", "→ POWR 1 non-OK reply: %s", reply.c_str());
          }

  - id: projector_power_off
    then:
      - lambda: |-
          int s = tcp_connect_retry("pjlink.off", "${projector_ip}", 4352, 500, 1);
          if (s < 0) return;
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ESP_LOGW("pjlink", "off: no PJLINK 0 greeting (auth on?): %s", greet.c_str());
            ::close(s);
            return;
          }
          const char *cmd = "%1POWR 0\r";
          tcp_send(s, cmd, strlen(cmd));
          std::string reply;
          tcp_read_until_cr(s, reply, 500);
          ::close(s);
          if (reply.find("POWR=OK") != std::string::npos) {
            ESP_LOGI("pjlink", "→ POWR 0 OK");
          } else {
            ESP_LOGW("pjlink", "→ POWR 0 non-OK reply: %s", reply.c_str());
          }

  - id: projector_query_state
    then:
      - lambda: |-
          int err = 0;
          int s = tcp_connect("${projector_ip}", 4352, 500, &err);
          if (s < 0) {
            ESP_LOGD("pjlink", "query connect fail (errno=%d %s)", err, strerror(err));
            return;
          }
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ::close(s);
            return;
          }
          const char *q = "%1POWR ?\r";
          tcp_send(s, q, strlen(q));
          std::string resp;
          tcp_read_until_cr(s, resp, 500);
          ::close(s);
          ESP_LOGI("pjlink", "POWR? → %s", resp.c_str());

  # ---- TEMPORARY: endstop relocation bench test --------------------------
  # New endstop semantics: endstop_a is tripped when actuator A is at its
  # fully-retracted endpoint. So a useful test is "leaves and returns":
  #
  #   Per cycle (precondition: endstop tripped, actuator at home):
  #     1. Extend actuator 1
  #     2. Time-to-release: wait_until endstop_a OFF, log delta
  #     3. Continue extending +2 s to get well clear
  #     4. Stop
  #     5. Retract actuator 1
  #     6. Time-to-re-trip: wait_until endstop_a ON, log delta (20 s timeout
  #        is enough for a full retract from full extension at 0.6"/s)
  #     7. Stop
  #
  # Never touches bts_b_enable as a driver; lpwm/rpwm never overlap.
  # mode: single — re-pressing the button while it's running is a no-op.
  # Stoppable via script.stop from emergency_stop / STOP button.
  # If the initial endstop reads OFF, the precondition isn't met → log + skip.
  - id: test_endstop_a_cycle
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "TEST start — initial endstop_1=%d jog_pct=%.0f%%",
                   id(endstop_a).state, id(jog_pct).state);
      - if:
          condition:
            lambda: return !id(endstop_a).state;
          then:
            - logger.log:
                format: "TEST aborted — endstop 1 must be tripped at start (actuator at retracted home)"
                level: WARN
      - if:
          condition:
            lambda: return id(endstop_a).state;
          then:
            - repeat:
                count: 3
                then:
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: extending actuator 1 (waiting for endstop release)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: rpwm, transition_length: 0s }
                  - switch.turn_off: bts_b_enable
                  - delay: 50ms
                  - switch.turn_on: bts_a_enable
                  - light.turn_on:
                      id: lpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_off: endstop_a
                      timeout: 5s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (!id(endstop_a).state) {
                        ESP_LOGI("test", "cycle %d: endstop 1 RELEASED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 1 did NOT release — 5 s timeout", c);
                      }
                  # Continue extending 2 s to get well clear of the trip point.
                  - delay: 2000ms
                  - light.turn_off: { id: lpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_a_enable
                  - delay: 500ms
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: retracting actuator 1 (waiting for endstop re-trip)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: lpwm, transition_length: 0s }
                  - delay: 50ms
                  - switch.turn_on: bts_a_enable
                  - light.turn_on:
                      id: rpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_on: endstop_a
                      timeout: 20s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (id(endstop_a).state) {
                        ESP_LOGI("test", "cycle %d: endstop 1 RE-TRIPPED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 1 did NOT re-trip — 20 s timeout", c);
                      }
                  # Let the actuator settle into the PA-04 internal limit
                  # for ~500 ms before we stop the retract.
                  - delay: 500ms
                  - light.turn_off: { id: rpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_a_enable
                  - delay: 1000ms
      - logger.log:
          format: "TEST complete"
          level: INFO

  # ---- TEMPORARY: endstop 2 / actuator 2 mirror of the above --------------
  - id: test_endstop_b_cycle
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "TEST start — initial endstop_2=%d jog_pct=%.0f%%",
                   id(endstop_b).state, id(jog_pct).state);
      - if:
          condition:
            lambda: return !id(endstop_b).state;
          then:
            - logger.log:
                format: "TEST aborted — endstop 2 must be tripped at start (actuator at retracted home)"
                level: WARN
      - if:
          condition:
            lambda: return id(endstop_b).state;
          then:
            - repeat:
                count: 3
                then:
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: extending actuator 2 (waiting for endstop release)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: rpwm, transition_length: 0s }
                  - switch.turn_off: bts_a_enable
                  - delay: 50ms
                  - switch.turn_on: bts_b_enable
                  - light.turn_on:
                      id: lpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_off: endstop_b
                      timeout: 5s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (!id(endstop_b).state) {
                        ESP_LOGI("test", "cycle %d: endstop 2 RELEASED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 2 did NOT release — 5 s timeout", c);
                      }
                  - delay: 2000ms
                  - light.turn_off: { id: lpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_b_enable
                  - delay: 500ms
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: retracting actuator 2 (waiting for endstop re-trip)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: lpwm, transition_length: 0s }
                  - delay: 50ms
                  - switch.turn_on: bts_b_enable
                  - light.turn_on:
                      id: rpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_on: endstop_b
                      timeout: 20s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (id(endstop_b).state) {
                        ESP_LOGI("test", "cycle %d: endstop 2 RE-TRIPPED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 2 did NOT re-trip — 20 s timeout", c);
                      }
                  - delay: 500ms
                  - light.turn_off: { id: rpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_b_enable
                  - delay: 1000ms
      - logger.log:
          format: "TEST complete"
          level: INFO

# ===========================================================================
# Diagnostic buttons — bench bring-up + manual mode triggers
# Safety controls live at the top so they're easy to find in the web UI.
# ===========================================================================
button:
  # ----- EMERGENCY STOP --------------------------------------------------
  # Kills every motor instantly + drops the screen + marks state=FAULT.
  # Stops all in-flight motion scripts before cutting PWM/BTS so their
  # delays / wait_until can't resume after this fires. Recover via
  # "Diag: reset to CLOSED" once the box is in a known-safe position.
  - platform: template
    name: "!! STOP — kill all motion"
    icon: mdi:alert-octagon
    on_press:
      # Stop endstop-test scripts first (they live in YAML, C++ can't reach
      # them). emergency_stop() cancels scheduled callbacks + kills PWM/BTS
      # + drops the screen + sets state=FAULT.
      - script.stop: test_endstop_a_cycle
      - script.stop: test_endstop_b_cycle
      - lambda: id(lift).emergency_stop();
    web_server:
      sorting_group_id: safety_group
      sorting_weight: 10

  # Hardware-grade backstop: full ESP32 reboot. Use if STOP doesn't behave
  # (firmware wedge / scheduler stuck). All GPIOs return to power-on
  # defaults — BTS EN drops, PWM stops, motors coast. ~5 s downtime.
  - platform: restart
    name: "!! Reboot ESP32"
    icon: mdi:restart-alert
    web_server:
      sorting_group_id: safety_group
      sorting_weight: 20

  - platform: template
    name: "Wall button (virtual)"
    icon: mdi:gesture-tap-button
    on_press:
      - lambda: id(lift).on_button_press();
    web_server:
      sorting_group_id: primary_group
      sorting_weight: 10

  - platform: template
    name: "Diag: reset to CLOSED"
    icon: mdi:restore
    on_press:
      - lambda: id(lift).force_closed();
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 10

  - platform: template
    name: "Diag: jog extend 500ms"
    icon: mdi:arrow-up-bold-outline
    on_press:
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on: { id: lpwm, brightness: 0.6, transition_length: 100ms }
      - delay: 500ms
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 100ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 20

  - platform: template
    name: "Diag: jog retract 500ms"
    icon: mdi:arrow-down-bold-outline
    on_press:
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on: { id: rpwm, brightness: 0.6, transition_length: 100ms }
      - delay: 500ms
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 100ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 30

  - platform: template
    name: "Diag: AVR → INDOOR"
    icon: mdi:television
    on_press:
      - script.execute: avr_indoor
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 40
  - platform: template
    name: "Diag: AVR → OUTDOOR"
    icon: mdi:projector
    on_press:
      - script.execute: avr_outdoor
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 50
  - platform: template
    name: "Diag: AVR → BOTH"
    icon: mdi:audio-video
    on_press:
      - script.execute: avr_both
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 60
  - platform: template
    name: "Diag: Projector POWR 1"
    icon: mdi:projector
    on_press:
      - script.execute: projector_power_on
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 70
  - platform: template
    name: "Diag: Projector POWR 0"
    icon: mdi:projector-off
    on_press:
      - script.execute: projector_power_off
    web_server:
      sorting_group_id: diag_group
      sorting_weight: 80

  # ----- TEMPORARY: endstop relocation bench test --------------------------
  # Added 2026-06-30 to validate endstop A after relocation to actuator 1.
  # Wraps the test script below so STOP can interrupt mid-cycle via
  # script.stop. Remove this button + its script after the relocated
  # endstops + IS-pin pulldown mod are both validated.
  - platform: template
    name: "Test: endstop A trip cycle (3x)"
    icon: mdi:flask-outline
    on_press:
      - script.execute: test_endstop_a_cycle
    web_server:
      sorting_group_id: tests_group
      sorting_weight: 10

  - platform: template
    name: "Test: endstop B trip cycle (3x)"
    icon: mdi:flask-outline
    on_press:
      - script.execute: test_endstop_b_cycle
    web_server:
      sorting_group_id: tests_group
      sorting_weight: 20
