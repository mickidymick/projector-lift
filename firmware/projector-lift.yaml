# ESPHome firmware — porch projector lift box
# Wiring + state-machine reference: ../index.html (rendered:
# https://mickidymick.github.io/projector-lift/) — §9 wiring sketch · §10
# firmware target · §12 AV chain (Telnet + PJLink) · §13 Alexa integration
#
# PIN MAP (matches §9 as-built GPIO map):
#   GPIO25  RPWM  → BTS7960 #1 + #2 RPWM (retract / close, tied)
#   GPIO26  LPWM  → BTS7960 #1 + #2 LPWM (extend  / open,  tied)
#   GPIO27  → BTS7960 #1 R_EN + L_EN (independent enable · actuator A)
#   GPIO19  → BTS7960 #2 R_EN + L_EN (independent enable · actuator B)
#   GPIO32  ← BTS7960 #1 R_IS (ADC1_4) actuator A retract (close) current
#   GPIO33  ← BTS7960 #1 L_IS (ADC1_5) actuator A extend  (open)  current
#   GPIO34  ← BTS7960 #2 R_IS (ADC1_6) actuator B retract (close) current
#   GPIO35  ← BTS7960 #2 L_IS (ADC1_7) actuator B extend  (open)  current
#   GPIO17  → IRLZ44N gate via 220 Ω (low-side fan PWM, 6.5 V rail)
#   GPIO16  → 1 kΩ → BC547 base → F-1001 coil (screen drop)
#   GPIO18  ← wall button (Square D X-Series SQR14106WH momentary, switch-to-GND, INPUT_PULLUP)
#   GPIO23  ← Prusa endstop A SIG (deployed-end, NO-to-GND, INPUT_PULLUP)
#   GPIO22  ← Prusa endstop B SIG (deployed-end, NO-to-GND, INPUT_PULLUP)
#
# CONTROL MODEL — single momentary button, state-machine-driven dispatch:
#   state=CLOSED        ⇒ press triggers OPEN  (with endstop confirmation logged)
#   state=OPENING/OPEN  ⇒ press triggers CLOSE
#   state=CLOSING       ⇒ press REVERSES to OPEN (open_lift stops close_lift first)
#   state=COOLDOWN      ⇒ press cancels the cooldown timer and reopens
#   state=FAULT         ⇒ press is ignored (manual Diag reset required)
#
# Endstops are pure state-confirmation sensors — they do NOT cut motors.
# New rails travel 12" vs the actuators' 8" stroke, so the PA-04 internal
# limit switches are the mechanical safety at both ends of travel; the
# external endstops are no longer needed for slide-overrun protection.
# Each endstop is mounted directly on its actuator and trips when the
# actuator is at its fully-retracted endpoint. With BOTH tripped we know
# with certainty that the box is fully CLOSED. Otherwise we treat it as
# OPEN / in motion.
#
# End-of-travel signal for BOTH directions is the IS-pin current drop:
# when the PA-04 internal limit opens the motor circuit, the IS-pin voltage
# falls to ~0. OPENING reads L_IS (extend current); CLOSING reads R_IS
# (retract current). The high end of the IS range saturates the ADC at the
# on-module 10 kΩ pulldown but the low end is fully readable, so
# "current dropped to zero" is a clean binary signal. The travel-safety
# timeout is the fallback failsafe in both directions.
#
# Network reach (§12): on lift state change the firmware sends Telnet mode
# commands to the Denon AVR (port 23) and PJLink power commands to the Epson
# projector (port 4352). AVR persists settings across standby, so Apple TV's
# CEC wake reads the current config.

substitutions:
  name: projector-lift
  friendly: "Projector Lift"

  # Static endpoints — edit to match your DHCP reservations.
  avr_ip: "192.168.1.50"        # Denon AVR-X2800H · Telnet :23
  projector_ip: "192.168.1.51"  # Epson PowerLite L730U · PJLink :4352

esphome:
  name: ${name}
  friendly_name: ${friendly}
  includes:
    - includes.h
  on_boot:
    # Pull every output to a known-safe state before WiFi is up.
    - priority: -100
      then:
        - script.execute: enter_closed
    # Once the network is up, reconcile AVR + projector to current state.
    - priority: -200
      then:
        - script.execute: boot_reconcile

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 115200
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name}-setup"
    password: !secret ap_password
captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Browser UI at http://projector-lift.local/ — live sensor readouts + the
# Diag buttons + manual reset. No auth (LAN-only assumption); flip to
# `auth:` + credentials if exposing beyond the trusted network.
web_server:
  port: 80
  version: 3
  ota: false
  log: true

# ===========================================================================
# Tunables — HA Number entities so calibration doesn't need a re-flash.
# PLACEHOLDER entries are marked; measure real values on the bench (see README)
# before trusting auto-stop on current sense.
# ===========================================================================
number:
  - platform: template
    name: "Cooldown duration"
    id: cooldown_min
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: min

  - platform: template
    name: "PWM ramp duration"
    id: ramp_ms
    min_value: 100
    max_value: 2000
    step: 50
    initial_value: 500
    restore_value: true
    optimistic: true
    unit_of_measurement: ms

  - platform: template
    name: "Cruise duty"
    id: cruise_pct
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 70
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

  - platform: template
    name: "Fan running duty"
    id: fan_running_pct
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 100
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

  - platform: template
    name: "Fan cooldown duty"
    id: fan_cooldown_pct
    min_value: 20
    max_value: 100
    step: 5
    initial_value: 50
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

  - platform: template
    name: "End-of-travel threshold"
    id: eot_v
    min_value: 0.00
    max_value: 1.50
    step: 0.01
    initial_value: 0.18
    restore_value: true
    optimistic: true
    unit_of_measurement: V

  - platform: template
    name: "Stall threshold"
    id: stall_v
    min_value: 0.30
    max_value: 3.20
    step: 0.05
    initial_value: 0.50
    restore_value: true
    optimistic: true
    unit_of_measurement: V

  - platform: template
    name: "Screen post-close delay"
    id: screen_delay_s
    min_value: 0
    max_value: 10
    step: 0.5
    initial_value: 3
    restore_value: true
    optimistic: true
    unit_of_measurement: s

  - platform: template
    name: "Travel safety timeout"
    id: travel_timeout_s
    min_value: 5
    max_value: 60
    step: 1
    initial_value: 30
    restore_value: true
    optimistic: true
    unit_of_measurement: s

  - platform: template
    name: "Jog duty"
    id: jog_pct
    min_value: 30
    max_value: 100
    step: 5
    initial_value: 70
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    mode: slider

globals:
  # 0=CLOSED 1=OPENING 2=OPEN 3=CLOSING 4=COOLDOWN 5=FAULT
  - id: lift_state
    type: int
    initial_value: '0'
  # Last observed AVR VSMONI? response: -1 unknown · 1 MONI1 · 2 MONI2 · 3 AUTO
  - id: avr_monitor_state
    type: int
    initial_value: '-1'
  # wait_until debounce timers + exit-reason for open_lift / close_lift.
  # Reset to 0 before each wait_until; the condition-lambda accumulates them.
  # exit_reason: 0=still running, 1=EOT reached, 2=stall detected
  - id: is_eot_low_since
    type: uint32_t
    initial_value: '0'
  - id: is_stall_high_since
    type: uint32_t
    initial_value: '0'
  - id: wait_exit_reason
    type: int
    initial_value: '0'

# ===========================================================================
# PWM outputs — LEDC at 20 kHz (above hearing) for motors; fan PWM at 25 kHz
# to keep MOSFET switching losses sane while staying inaudible. monochromatic
# light wrappers give free soft-ramping; gamma_correct: 1.0 keeps the duty
# curve linear (default 2.8 would non-linearly distort it).
# ===========================================================================
output:
  - platform: ledc
    pin: GPIO25
    id: rpwm_raw
    frequency: 20000Hz
  - platform: ledc
    pin: GPIO26
    id: lpwm_raw
    frequency: 20000Hz
  - platform: ledc
    pin: GPIO17
    id: fan_pwm_raw
    frequency: 25000Hz

light:
  - platform: monochromatic
    output: rpwm_raw
    id: rpwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s
  - platform: monochromatic
    output: lpwm_raw
    id: lpwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s
  - platform: monochromatic
    output: fan_pwm_raw
    id: fan_pwm
    internal: true
    gamma_correct: 1.0
    default_transition_length: 0s

# ===========================================================================
# Discrete outputs
#   screen_relay — BC547 base drive · HIGH closes the F-1001 contact
#   bts_a_enable / bts_b_enable — BTS7960 R_EN + L_EN (one per actuator)
#       HIGH = BTS module active · LOW = outputs hi-Z (motor coasts)
#       Held LOW at rest so a glitch on PWM can't move the motors.
# ===========================================================================
switch:
  - platform: gpio
    pin: GPIO16
    id: screen_relay
    name: "Screen relay"
    restore_mode: ALWAYS_OFF
    icon: mdi:projector-screen

  - platform: gpio
    pin: GPIO27
    id: bts_a_enable
    name: "BTS A enable"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO19
    id: bts_b_enable
    name: "BTS B enable"
    restore_mode: ALWAYS_OFF
    internal: true

  # Alexa-friendly power surface: "Alexa, turn on/off the projector".
  # HA's Alexa bridge maps this to PowerController; the cover entity below
  # stays around for HA's UI semantics (open/close).
  - platform: template
    name: "Projector"
    id: projector_switch
    icon: mdi:projector
    optimistic: false
    lambda: |-
      int s = id(lift_state);
      return s == 1 || s == 2;
    turn_on_action:
      - lambda: |-
          int s = id(lift_state);
          if (s == 0) {
            id(open_lift).execute();
          } else if (s == 4) {
            id(cooldown_timer).stop();
            id(open_lift).execute();
          }
    turn_off_action:
      - lambda: |-
          if (id(lift_state) == 2) id(close_lift).execute();

  # ----- Per-actuator leveling jogs ---------------------------------------
  # Click ON to start moving, click OFF to stop. NO software timeout.
  # Mutex: turning any one ON turns the others OFF (shared PWM lines mean
  # opposing directions ON simultaneously = BTS shoot-through).
  # Endstops interrupt the matching extend jog only (endstop A → jog_a_up,
  # endstop B → jog_b_up). Retract jogs are not interrupted (PA-04 internal
  # limit catches end-of-travel mechanically).

  - platform: template
    name: "Level: 1 up (extend)"
    id: jog_a_up
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      # Mutex via publish_state — does NOT trigger the other switches'
      # turn_off_action (which would race and cut our bts/PWM mid-motion).
      - lambda: |-
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - switch.turn_off: bts_b_enable
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable

  - platform: template
    name: "Level: 1 down (retract)"
    id: jog_a_down
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - switch.turn_off: bts_b_enable
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable

  - platform: template
    name: "Level: 2 up (extend)"
    id: jog_b_up
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - delay: 50ms
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Level: 2 down (retract)"
    id: jog_b_down
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_both_up).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - delay: 50ms
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_b_enable

  # ----- Both-actuator jogs (in-sync leveling / travel check) -------------
  # Same pattern as the per-actuator jogs, but enables BOTH BTS modules so
  # A and B drive together at the same duty. No endstop cutoff — user is
  # watching; PA-04 internal 8" limits are mechanical backup at both ends
  # (drawer slides are 12" so they can't be the failure surface).
  - platform: template
    name: "Level: both up (extend)"
    id: jog_both_up
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_down).publish_state(false);
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Level: both down (retract)"
    id: jog_both_down
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(jog_a_up).publish_state(false);
          id(jog_a_down).publish_state(false);
          id(jog_b_up).publish_state(false);
          id(jog_b_down).publish_state(false);
          id(jog_both_up).publish_state(false);
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(jog_pct).state / 100.0;
          transition_length: 100ms
    turn_off_action:
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 150ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

# ===========================================================================
# Inputs — wall button + two endstops. All three are NO switch-to-GND with
# INPUT_PULLUP enabled; `inverted: true` so "active" reads as "pressed/tripped".
# ===========================================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode: INPUT_PULLUP
      inverted: true
    id: wall_button
    name: "Wall button"
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    # Momentary rocker (Square D X-Series SQR14106WH): each press fires once;
    # release is ignored. Dispatch is endstop-driven (see wall_press script):
    # both endstops tripped ⇒ box is home ⇒ OPEN. Any endstop off ⇒ CLOSE
    # (retract to home). FAULT ignores the button — Diag: reset to recover.
    # Rationale for endstop-driven (vs state-driven) dispatch: the endstops
    # are the only authoritative "where is the box?" signal. After a FAULT +
    # Diag reset, or a manual box push, lift_state can be wrong and the
    # button needs to still drive the box toward a known-safe endpoint.
    on_press:
      - script.execute: wall_press

  # Endstops are pure state-confirmation sensors under the new design — they
  # do NOT cut motors. Motors run to the PA-04 internal limit and stop when
  # the IS-pin current drops. on_press / on_release here is informational
  # only (logging + the state-derivation text sensor reads .state directly).
  - platform: gpio
    pin:
      number: GPIO23
      mode: INPUT_PULLUP
      inverted: true
    id: endstop_a
    name: "Endstop 1"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop A tripped — actuator 1 at retracted endpoint (state=%d)", id(lift_state));
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop A released — actuator 1 left retracted endpoint (state=%d)", id(lift_state));

  - platform: gpio
    pin:
      number: GPIO22
      mode: INPUT_PULLUP
      inverted: true
    id: endstop_b
    name: "Endstop 2"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop B tripped — actuator 2 at retracted endpoint (state=%d)", id(lift_state));
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("lift", "endstop B released — actuator 2 left retracted endpoint (state=%d)", id(lift_state));

sensor:
  - platform: adc
    pin: GPIO32
    id: a_ris
    name: "Actuator 1 R_IS"
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
  - platform: adc
    pin: GPIO33
    id: a_lis
    name: "Actuator 1 L_IS"
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
  - platform: adc
    pin: GPIO34
    id: b_ris
    name: "Actuator 2 R_IS"
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }
  - platform: adc
    pin: GPIO35
    id: b_lis
    name: "Actuator 2 L_IS"
    update_interval: 50ms
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: V
    filters:
      - sliding_window_moving_average: { window_size: 3, send_every: 1 }

text_sensor:
  - platform: template
    name: "Lift state"
    id: lift_state_str
    update_interval: 1s
    lambda: |-
      // Derived from physical endstops, NOT the internal state machine —
      // so it reflects current physical reality across reboots / faults.
      // Endstops are mounted on the actuators and trip when those actuators
      // are at their fully-retracted endpoint. BOTH tripped = box certainly
      // CLOSED. Anything else (one tripped, neither tripped) = the box is
      // either OPEN, in motion, or in an asymmetric state — call it OPEN.
      if (id(endstop_a).state && id(endstop_b).state) {
        return {"CLOSED"};
      }
      return {"OPEN"};

  - platform: template
    name: "AVR monitor mode"
    id: avr_monitor_str
    update_interval: 5s
    lambda: |-
      switch (id(avr_monitor_state)) {
        case 1: return {"MONI1"};
        case 2: return {"MONI2"};
        case 3: return {"AUTO"};
        default: return {"unknown"};
      }

# ===========================================================================
# HA cover entity — gives HA + Alexa standard up/down semantics
# ===========================================================================
cover:
  - platform: template
    name: "Projector lift"
    id: lift_cover
    device_class: shutter
    optimistic: true
    assumed_state: true
    open_action:
      - lambda: |-
          int s = id(lift_state);
          if (s == 0) id(open_lift).execute();
          else if (s == 4) {
            id(cooldown_timer).stop();
            id(open_lift).execute();
          }
    close_action:
      - lambda: |-
          if (id(lift_state) == 2) id(close_lift).execute();
    stop_action:
      - script.execute: emergency_stop

# ===========================================================================
# Periodic AVR state polling — exposes monitor mode to HA while OPEN so HA
# can decide when to fire BOTH-mode commands. Detecting "Sony TV just woke"
# reliably from the AVR alone isn't possible on the X2800H without testing;
# the polling skeleton is here so HA automations have something to react to.
# ===========================================================================
interval:
  - interval: 5s
    then:
      - if:
          condition:
            lambda: return id(lift_state) == 2;
          then:
            - script.execute: avr_query_monitor

# ===========================================================================
# Scripts — state transitions + network clients
# ===========================================================================
script:
  # ---- Idle / safety -----------------------------------------------------
  - id: enter_closed
    then:
      - light.turn_off: { id: rpwm,    transition_length: 0s }
      - light.turn_off: { id: lpwm,    transition_length: 0s }
      - light.turn_off: { id: fan_pwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
      - switch.turn_off: screen_relay
      - lambda: id(lift_state) = 0;
      - logger.log:
          format: "→ CLOSED"
          level: INFO

  - id: emergency_stop
    then:
      # Halt every in-flight motion script first — otherwise their delays /
      # wait_until would resume after this script finishes and re-energize
      # the motors. Order matters: stop scripts, THEN kill PWM, THEN BTSes.
      - script.stop: open_lift
      - script.stop: close_lift
      - script.stop: test_endstop_a_cycle
      - script.stop: test_endstop_b_cycle
      # 0 s transition = instant kill (no fade). Faster than 100 ms is also
      # safer if a wedged scheduler is the reason we're here.
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
      # Release the screen too — we don't know what position the box is in
      # so leaving the screen deployed indefinitely is the wrong default.
      - switch.turn_off: screen_relay
      - lambda: id(lift_state) = 5;
      - logger.log:
          format: "EMERGENCY STOP (state=FAULT) — run 'Diag: reset to CLOSED' to recover"
          level: WARN

  # ---- Shared button-press dispatcher -----------------------------------
  # Called by both the physical wall button and the "Wall button (virtual)"
  # UI button. Dispatch is ENDSTOP-DRIVEN:
  #   FAULT                          → ignore + warn (Diag: reset to recover)
  #   both endstops tripped (=home)  → OPEN  (cancels in-flight COOLDOWN timer)
  #   otherwise (any endstop off)    → CLOSE (return home, whatever state was)
  # Rationale: the endstops are the only authoritative "where is the box?"
  # signal. lift_state can drift out of sync after a FAULT + Diag reset, a
  # boot glitch, or a user manually pushing the box. Basing dispatch on the
  # physical position removes those failure modes and ensures the button
  # always drives the box toward a known-safe endpoint.
  - id: wall_press
    then:
      - lambda: |-
          int s = id(lift_state);
          bool both_tripped = id(endstop_a).state && id(endstop_b).state;
          ESP_LOGI("lift", "button press (state=%d both_endstops=%d)", s, both_tripped);
          if (s == 5) {
            ESP_LOGW("lift", "in FAULT — ignoring button; run Diag: reset");
            return;
          }
          if (both_tripped) {
            if (s == 4) {
              ESP_LOGI("lift", "canceling cooldown");
              id(cooldown_timer).stop();
            }
            id(open_lift).execute();
          } else {
            id(close_lift).execute();
          }

  # ---- OPEN sequence -----------------------------------------------------
  # Order matters: PJLink first (projector warm-up takes ~30 s in parallel),
  # then AVR routes to OUTDOOR mode (so the audio chain is ready), then we
  # drop the screen, kick fans, and ramp the actuators up.
  - id: open_lift
    mode: restart
    then:
      # Mutual-exclude with close_lift — without this an in-flight CLOSING
      # would keep ramping RPWM after we set state=OPENING.
      - script.stop: close_lift
      - lambda: id(lift_state) = 1;
      - logger.log:
          format: "→ OPENING"
          level: INFO
      - script.execute: projector_power_on
      - script.execute: avr_outdoor
      - switch.turn_on: screen_relay
      - light.turn_on:
          id: fan_pwm
          brightness: !lambda return id(fan_running_pct).state / 100.0;
          transition_length: 200ms
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - delay: 50ms                                              # deadtime
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: lpwm
          brightness: !lambda return id(cruise_pct).state / 100.0;
          transition_length: !lambda return id(ramp_ms).state;
      # Hold off EOT checks until ramp completes + 250 ms current settle.
      - delay: !lambda return id(ramp_ms).state + 250;
      # Reset debounce timers + exit reason before entering wait_until.
      - lambda: |-
          id(is_eot_low_since) = 0;
          id(is_stall_high_since) = 0;
          id(wait_exit_reason) = 0;
      - wait_until:
          condition:
            lambda: |-
              // EOT for OPENING: L_IS drops to ~0 when each PA-04 hits its
              // internal extend limit (motor circuit opens). Debounced
              // 250 ms below eot_v to reject transient cruise dips.
              // Stall: either L_IS spikes above stall_v for 100 ms sustained
              // (mechanical obstruction / broken internal limit switch).
              float eot   = id(eot_v).state;
              float stall = id(stall_v).state;
              float al    = id(a_lis).state;
              float bl    = id(b_lis).state;
              uint32_t now = millis();

              bool both_low = (al < eot) && (bl < eot);
              if (!both_low) { id(is_eot_low_since) = 0; }
              else if (id(is_eot_low_since) == 0) { id(is_eot_low_since) = now; }
              if (id(is_eot_low_since) != 0 &&
                  now - id(is_eot_low_since) >= 250) {
                id(wait_exit_reason) = 1;
                return true;
              }

              bool either_high = (al > stall) || (bl > stall);
              if (!either_high) { id(is_stall_high_since) = 0; }
              else if (id(is_stall_high_since) == 0) { id(is_stall_high_since) = now; }
              if (id(is_stall_high_since) != 0 &&
                  now - id(is_stall_high_since) >= 100) {
                id(wait_exit_reason) = 2;
                return true;
              }

              return false;
          timeout: !lambda return (uint32_t)(id(travel_timeout_s).state * 1000);
      - light.turn_off:
          id: lpwm
          transition_length: !lambda return id(ramp_ms).state;
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
      - lambda: |-
          // Distinguish the three ways wait_until can end.
          if (id(lift_state) != 1) return;        // preempted — leave alone
          int reason = id(wait_exit_reason);
          if (reason == 1) {
            id(lift_state) = 2;
            ESP_LOGI("lift", "→ OPEN");
            // Endstops should both be released by now (we extended away
            // from the retracted endpoint). Warn if one's still tripped —
            // that actuator may not have moved.
            if (id(endstop_a).state || id(endstop_b).state) {
              ESP_LOGW("lift", "OPEN reached but endstop still tripped (a=%d b=%d) — check actuator",
                       id(endstop_a).state, id(endstop_b).state);
            }
          } else if (reason == 2) {
            id(lift_state) = 5;
            ESP_LOGW("lift", "OPENING stall detected — L_IS above %.2f V (a=%.2f b=%.2f) → FAULT",
                     id(stall_v).state, id(a_lis).state, id(b_lis).state);
          } else {
            id(lift_state) = 5;
            ESP_LOGW("lift", "OPENING timeout — L_IS never collapsed (→ FAULT)");
          }

  # ---- CLOSE sequence ----------------------------------------------------
  # PJLink OFF starts the projector's internal cooldown. AVR returns to
  # INDOOR mode now (per §12 spec); in the expected user flow Apple TV is
  # already powered down so Zone 2 is silent — there's no audio to cut.
  - id: close_lift
    mode: restart
    then:
      - script.stop: open_lift
      - lambda: id(lift_state) = 3;
      - logger.log:
          format: "→ CLOSING"
          level: INFO
      - script.execute: projector_power_off
      - script.execute: avr_indoor
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - delay: 50ms                                              # deadtime
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on:
          id: rpwm
          brightness: !lambda return id(cruise_pct).state / 100.0;
          transition_length: !lambda return id(ramp_ms).state;
      - delay: !lambda return id(ramp_ms).state + 250;
      # Reset debounce timers + exit reason before entering wait_until.
      - lambda: |-
          id(is_eot_low_since) = 0;
          id(is_stall_high_since) = 0;
          id(wait_exit_reason) = 0;
      - wait_until:
          condition:
            lambda: |-
              // EOT for CLOSING: R_IS drops to ~0 when each PA-04 hits its
              // internal retract limit. Debounced 250 ms below eot_v to
              // reject transient cruise dips.
              // Stall: either R_IS spikes above stall_v for 100 ms sustained
              // (mechanical obstruction / cable snag on retract).
              float eot   = id(eot_v).state;
              float stall = id(stall_v).state;
              float ar    = id(a_ris).state;
              float br    = id(b_ris).state;
              uint32_t now = millis();

              bool both_low = (ar < eot) && (br < eot);
              if (!both_low) { id(is_eot_low_since) = 0; }
              else if (id(is_eot_low_since) == 0) { id(is_eot_low_since) = now; }
              if (id(is_eot_low_since) != 0 &&
                  now - id(is_eot_low_since) >= 250) {
                id(wait_exit_reason) = 1;
                return true;
              }

              bool either_high = (ar > stall) || (br > stall);
              if (!either_high) { id(is_stall_high_since) = 0; }
              else if (id(is_stall_high_since) == 0) { id(is_stall_high_since) = now; }
              if (id(is_stall_high_since) != 0 &&
                  now - id(is_stall_high_since) >= 100) {
                id(wait_exit_reason) = 2;
                return true;
              }

              return false;
          timeout: !lambda return (uint32_t)(id(travel_timeout_s).state * 1000);
      - light.turn_off:
          id: rpwm
          transition_length: !lambda return id(ramp_ms).state;
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable
      - lambda: |-
          // Distinguish the three ways wait_until can end.
          if (id(lift_state) != 3) return;        // preempted — leave alone
          int reason = id(wait_exit_reason);
          if (reason == 1) {
            id(lift_state) = 4;
            ESP_LOGI("lift", "→ COOLDOWN");
            // Sanity check: both endstops should now read tripped (we just
            // retracted to the calibrated home). If one or both are off,
            // the actuator stopped short of the endstop's mount position.
            // Don't FAULT — could be travel variance — but flag clearly.
            if (!id(endstop_a).state || !id(endstop_b).state) {
              ESP_LOGW("lift", "CLOSED reached (R_IS dropped) but endstop not tripped (a=%d b=%d) — actuator may be short of home",
                       id(endstop_a).state, id(endstop_b).state);
            }
          } else if (reason == 2) {
            id(lift_state) = 5;
            ESP_LOGW("lift", "CLOSING stall detected — R_IS above %.2f V (a=%.2f b=%.2f) → FAULT",
                     id(stall_v).state, id(a_ris).state, id(b_ris).state);
          } else {
            id(lift_state) = 5;
            ESP_LOGW("lift", "CLOSING timeout — R_IS never collapsed (→ FAULT)");
          }
      # If FAULT, release the screen here too — the cooldown block below
      # only runs in state==4 so the screen would otherwise stay energized.
      - if:
          condition:
            lambda: return id(lift_state) == 5;
          then:
            - switch.turn_off: screen_relay
      - if:
          condition:
            lambda: return id(lift_state) == 4;
          then:
            - delay: !lambda return (uint32_t)(id(screen_delay_s).state * 1000);
            - switch.turn_off: screen_relay
            # Step fan down to the lower cooldown duty for the long dwell.
            - light.turn_on:
                id: fan_pwm
                brightness: !lambda return id(fan_cooldown_pct).state / 100.0;
                transition_length: 1s
            - script.execute: cooldown_timer

  - id: cooldown_timer
    mode: restart
    then:
      - delay: !lambda return (uint32_t)(id(cooldown_min).state * 60.0 * 1000.0);
      - light.turn_off: { id: fan_pwm, transition_length: 1s }
      - lambda: |-
          id(lift_state) = 0;
          ESP_LOGI("lift", "cooldown done → CLOSED");

  # ---- Boot reconciliation ----------------------------------------------
  # Derive the initial state from the physical endstops once they've settled,
  # then route AVR mode accordingly. This handles power-loss-while-open
  # cleanly — without it, on_boot's enter_closed would have left us thinking
  # the box was closed when the actuators are actually extended.
  # Asymmetric endstops (one tripped, one not) is ambiguous → FAULT so the
  # user can investigate before commanding more motion.
  - id: boot_reconcile
    then:
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - delay: 1s
      - lambda: |-
          bool a = id(endstop_a).state;
          bool b = id(endstop_b).state;
          if (a && b) {
            // Already CLOSED from enter_closed — leave state alone.
            ESP_LOGI("lift", "boot reconcile: both endstops tripped → CLOSED (confirmed)");
          } else if (!a && !b) {
            // Box was physically extended at boot — recover OPEN state.
            id(lift_state) = 2;
            ESP_LOGI("lift", "boot reconcile: neither endstop tripped → OPEN (recovered)");
          } else {
            id(lift_state) = 5;
            ESP_LOGW("lift", "boot reconcile: endstops asymmetric (a=%d b=%d) → FAULT", a, b);
          }
      - if:
          condition:
            lambda: return id(lift_state) == 0;
          then:
            - script.execute: avr_indoor
      - if:
          condition:
            lambda: return id(lift_state) == 2;
          then:
            - script.execute: avr_outdoor
      - script.execute: projector_query_state

  # ===========================================================================
  # AVR Telnet client — Denon AVR-X2800H, port 23. Commands are ASCII,
  # CR-terminated. Each script opens a fresh TCP connection so a network blip
  # doesn't leave a stale socket pinned to the AVR. Sockets are POSIX/lwip
  # via the helpers in includes.h — works in both Arduino and ESP-IDF builds.
  # ===========================================================================
  - id: avr_indoor
    then:
      - lambda: |-
          int s = tcp_connect("${avr_ip}", 23, 500);
          if (s < 0) {
            ESP_LOGW("avr", "indoor: connect fail");
            return;
          }
          const char *cmd = "VSMONI1\rMUOFF\rZ2OFF\r";
          tcp_send(s, cmd, strlen(cmd));
          ::close(s);
          ESP_LOGI("avr", "→ INDOOR (VSMONI1 / MUOFF / Z2OFF)");

  - id: avr_outdoor
    then:
      - lambda: |-
          int s = tcp_connect("${avr_ip}", 23, 500);
          if (s < 0) {
            ESP_LOGW("avr", "outdoor: connect fail");
            return;
          }
          const char *cmd = "VSMONI2\rMUON\rZ2SOURCE\rZ2ON\r";
          tcp_send(s, cmd, strlen(cmd));
          ::close(s);
          ESP_LOGI("avr", "→ OUTDOOR (VSMONI2 / MUON / Z2SOURCE / Z2ON)");

  - id: avr_both
    then:
      - lambda: |-
          int s = tcp_connect("${avr_ip}", 23, 500);
          if (s < 0) {
            ESP_LOGW("avr", "both: connect fail");
            return;
          }
          const char *cmd = "VSMONIAUTO\rMUOFF\rZ2SOURCE\rZ2ON\r";
          tcp_send(s, cmd, strlen(cmd));
          ::close(s);
          ESP_LOGI("avr", "→ BOTH (VSMONIAUTO / MUOFF / Z2SOURCE / Z2ON)");

  - id: avr_query_monitor
    then:
      - lambda: |-
          int s = tcp_connect("${avr_ip}", 23, 300);
          if (s < 0) return;
          // Denon "VS" family uses a space before `?` for queries. If the
          // AVR returns nothing on first test, try "VSMONI?" without the
          // space — some firmware revisions accept either form.
          const char *q = "VSMONI ?\r";
          tcp_send(s, q, strlen(q));
          std::string resp;
          tcp_read_until_cr(s, resp, 300);
          ::close(s);
          int mode = -1;
          if      (resp.find("VSMONIAUTO") != std::string::npos) mode = 3;
          else if (resp.find("VSMONI2")    != std::string::npos) mode = 2;
          else if (resp.find("VSMONI1")    != std::string::npos) mode = 1;
          id(avr_monitor_state) = mode;
          ESP_LOGD("avr", "VSMONI? → %d", mode);

  # ===========================================================================
  # PJLink client — Epson L730U, port 4352. Class 1, ASCII, CR-terminated.
  # Assumes PJLink auth is disabled on the projector (Menu → Network →
  # PJLink → Authentication: OFF). If auth is enabled later, prefix the
  # command with the MD5 of (seed + password) per the PJLink spec.
  # ===========================================================================
  - id: projector_power_on
    then:
      - lambda: |-
          int s = tcp_connect("${projector_ip}", 4352, 500);
          if (s < 0) {
            ESP_LOGW("pjlink", "power_on: connect fail");
            return;
          }
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ESP_LOGW("pjlink", "no PJLINK 0 greeting (auth on?): %s", greet.c_str());
            ::close(s);
            return;
          }
          const char *cmd = "%1POWR 1\r";
          tcp_send(s, cmd, strlen(cmd));
          ::close(s);
          ESP_LOGI("pjlink", "→ POWR 1");

  - id: projector_power_off
    then:
      - lambda: |-
          int s = tcp_connect("${projector_ip}", 4352, 500);
          if (s < 0) {
            ESP_LOGW("pjlink", "power_off: connect fail");
            return;
          }
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ESP_LOGW("pjlink", "no PJLINK 0 greeting (auth on?): %s", greet.c_str());
            ::close(s);
            return;
          }
          const char *cmd = "%1POWR 0\r";
          tcp_send(s, cmd, strlen(cmd));
          ::close(s);
          ESP_LOGI("pjlink", "→ POWR 0");

  - id: projector_query_state
    then:
      - lambda: |-
          int s = tcp_connect("${projector_ip}", 4352, 500);
          if (s < 0) return;
          std::string greet;
          tcp_read_until_cr(s, greet, 500);
          if (greet.find("PJLINK 0") == std::string::npos) {
            ::close(s);
            return;
          }
          const char *q = "%1POWR ?\r";
          tcp_send(s, q, strlen(q));
          std::string resp;
          tcp_read_until_cr(s, resp, 500);
          ::close(s);
          ESP_LOGI("pjlink", "POWR? → %s", resp.c_str());

  # ---- TEMPORARY: endstop relocation bench test --------------------------
  # New endstop semantics: endstop_a is tripped when actuator A is at its
  # fully-retracted endpoint. So a useful test is "leaves and returns":
  #
  #   Per cycle (precondition: endstop tripped, actuator at home):
  #     1. Extend actuator 1
  #     2. Time-to-release: wait_until endstop_a OFF, log delta
  #     3. Continue extending +2 s to get well clear
  #     4. Stop
  #     5. Retract actuator 1
  #     6. Time-to-re-trip: wait_until endstop_a ON, log delta (20 s timeout
  #        is enough for a full retract from full extension at 0.6"/s)
  #     7. Stop
  #
  # Never touches bts_b_enable as a driver; lpwm/rpwm never overlap.
  # mode: single — re-pressing the button while it's running is a no-op.
  # Stoppable via script.stop from emergency_stop / STOP button.
  # If the initial endstop reads OFF, the precondition isn't met → log + skip.
  - id: test_endstop_a_cycle
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "TEST start — initial endstop_1=%d jog_pct=%.0f%%",
                   id(endstop_a).state, id(jog_pct).state);
      - if:
          condition:
            lambda: return !id(endstop_a).state;
          then:
            - logger.log:
                format: "TEST aborted — endstop 1 must be tripped at start (actuator at retracted home)"
                level: WARN
      - if:
          condition:
            lambda: return id(endstop_a).state;
          then:
            - repeat:
                count: 3
                then:
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: extending actuator 1 (waiting for endstop release)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: rpwm, transition_length: 0s }
                  - switch.turn_off: bts_b_enable
                  - delay: 50ms
                  - switch.turn_on: bts_a_enable
                  - light.turn_on:
                      id: lpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_off: endstop_a
                      timeout: 5s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (!id(endstop_a).state) {
                        ESP_LOGI("test", "cycle %d: endstop 1 RELEASED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 1 did NOT release — 5 s timeout", c);
                      }
                  # Continue extending 2 s to get well clear of the trip point.
                  - delay: 2000ms
                  - light.turn_off: { id: lpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_a_enable
                  - delay: 500ms
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: retracting actuator 1 (waiting for endstop re-trip)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: lpwm, transition_length: 0s }
                  - delay: 50ms
                  - switch.turn_on: bts_a_enable
                  - light.turn_on:
                      id: rpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_on: endstop_a
                      timeout: 20s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (id(endstop_a).state) {
                        ESP_LOGI("test", "cycle %d: endstop 1 RE-TRIPPED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 1 did NOT re-trip — 20 s timeout", c);
                      }
                  # Let the actuator settle into the PA-04 internal limit
                  # for ~500 ms before we stop the retract.
                  - delay: 500ms
                  - light.turn_off: { id: rpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_a_enable
                  - delay: 1000ms
      - logger.log:
          format: "TEST complete"
          level: INFO

  # ---- TEMPORARY: endstop 2 / actuator 2 mirror of the above --------------
  - id: test_endstop_b_cycle
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("test", "TEST start — initial endstop_2=%d jog_pct=%.0f%%",
                   id(endstop_b).state, id(jog_pct).state);
      - if:
          condition:
            lambda: return !id(endstop_b).state;
          then:
            - logger.log:
                format: "TEST aborted — endstop 2 must be tripped at start (actuator at retracted home)"
                level: WARN
      - if:
          condition:
            lambda: return id(endstop_b).state;
          then:
            - repeat:
                count: 3
                then:
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: extending actuator 2 (waiting for endstop release)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: rpwm, transition_length: 0s }
                  - switch.turn_off: bts_a_enable
                  - delay: 50ms
                  - switch.turn_on: bts_b_enable
                  - light.turn_on:
                      id: lpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_off: endstop_b
                      timeout: 5s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (!id(endstop_b).state) {
                        ESP_LOGI("test", "cycle %d: endstop 2 RELEASED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 2 did NOT release — 5 s timeout", c);
                      }
                  - delay: 2000ms
                  - light.turn_off: { id: lpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_b_enable
                  - delay: 500ms
                  - lambda: |-
                      ESP_LOGI("test", "cycle %d: retracting actuator 2 (waiting for endstop re-trip)",
                               (int)(iteration + 1));
                  - light.turn_off: { id: lpwm, transition_length: 0s }
                  - delay: 50ms
                  - switch.turn_on: bts_b_enable
                  - light.turn_on:
                      id: rpwm
                      brightness: !lambda return id(jog_pct).state / 100.0;
                      transition_length: 100ms
                  - wait_until:
                      condition:
                        binary_sensor.is_on: endstop_b
                      timeout: 20s
                  - lambda: |-
                      int c = (int)(iteration + 1);
                      if (id(endstop_b).state) {
                        ESP_LOGI("test", "cycle %d: endstop 2 RE-TRIPPED", c);
                      } else {
                        ESP_LOGW("test", "cycle %d: endstop 2 did NOT re-trip — 20 s timeout", c);
                      }
                  - delay: 500ms
                  - light.turn_off: { id: rpwm, transition_length: 100ms }
                  - delay: 150ms
                  - switch.turn_off: bts_b_enable
                  - delay: 1000ms
      - logger.log:
          format: "TEST complete"
          level: INFO

# ===========================================================================
# Diagnostic buttons — bench bring-up + manual mode triggers
# Safety controls live at the top so they're easy to find in the web UI.
# ===========================================================================
button:
  # ----- EMERGENCY STOP --------------------------------------------------
  # Kills every motor instantly + drops the screen + marks state=FAULT.
  # Stops all in-flight motion scripts before cutting PWM/BTS so their
  # delays / wait_until can't resume after this fires. Recover via
  # "Diag: reset to CLOSED" once the box is in a known-safe position.
  - platform: template
    name: "!! STOP — kill all motion"
    on_press:
      - script.execute: emergency_stop

  # Hardware-grade backstop: full ESP32 reboot. Use if STOP doesn't behave
  # (firmware wedge / scheduler stuck). All GPIOs return to power-on
  # defaults — BTS EN drops, PWM stops, motors coast. ~5 s downtime.
  - platform: restart
    name: "!! Reboot ESP32"

  - platform: template
    name: "Diag: jog extend 500ms"
    on_press:
      - light.turn_off: { id: rpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on: { id: lpwm, brightness: 0.6, transition_length: 100ms }
      - delay: 500ms
      - light.turn_off: { id: lpwm, transition_length: 100ms }
      - delay: 100ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Diag: jog retract 500ms"
    on_press:
      - light.turn_off: { id: lpwm, transition_length: 0s }
      - delay: 50ms
      - switch.turn_on: bts_a_enable
      - switch.turn_on: bts_b_enable
      - light.turn_on: { id: rpwm, brightness: 0.6, transition_length: 100ms }
      - delay: 500ms
      - light.turn_off: { id: rpwm, transition_length: 100ms }
      - delay: 100ms
      - switch.turn_off: bts_a_enable
      - switch.turn_off: bts_b_enable

  - platform: template
    name: "Wall button (virtual)"
    on_press:
      - script.execute: wall_press

  - platform: template
    name: "Diag: reset to CLOSED"
    on_press:
      - script.execute: enter_closed

  - platform: template
    name: "Diag: AVR → INDOOR"
    on_press:
      - script.execute: avr_indoor
  - platform: template
    name: "Diag: AVR → OUTDOOR"
    on_press:
      - script.execute: avr_outdoor
  - platform: template
    name: "Diag: AVR → BOTH"
    on_press:
      - script.execute: avr_both
  - platform: template
    name: "Diag: Projector POWR 1"
    on_press:
      - script.execute: projector_power_on
  - platform: template
    name: "Diag: Projector POWR 0"
    on_press:
      - script.execute: projector_power_off

  # ----- TEMPORARY: endstop relocation bench test --------------------------
  # Added 2026-06-30 to validate endstop A after relocation to actuator 1.
  # Wraps the test script below so STOP can interrupt mid-cycle via
  # script.stop. Remove this button + its script after the relocated
  # endstops + IS-pin pulldown mod are both validated.
  - platform: template
    name: "Test: endstop 1 trip cycle (3x)"
    on_press:
      - script.execute: test_endstop_a_cycle

  - platform: template
    name: "Test: endstop 2 trip cycle (3x)"
    on_press:
      - script.execute: test_endstop_b_cycle
